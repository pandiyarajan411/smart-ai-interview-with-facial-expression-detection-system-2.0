version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: smartinterview-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: smartinterview
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - smartinterview-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartinterview-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/smartinterview?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - smartinterview-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartinterview-web
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - smartinterview-net

volumes:
  mongo_data:

networks:
  smartinterview-net:
    driver: bridge
